{% load l10n %}
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Editar Venda</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fb;
    font-family:system-ui;
}

.container-box{
    max-width:500px;
    margin:80px auto;
}

.card{
    border:none;
    border-radius:12px;
}

</style>

</head>

<body>

<div class="container container-box">

<div class="card shadow">

<div class="card-header bg-warning text-dark">
<h5 class="mb-0">✏️ Editar Venda</h5>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Vendedor</label>
<input type="text" name="vendedor" value="{{ venda.vendedor }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Valor</label>
<input type="text" name="valor" value="{{ venda.valor|floatformat:2|localize }}" class="form-control" inputmode="decimal" required>
</div>

<div class="d-flex justify-content-between">
<a href="{% url 'dashboard' %}" class="btn btn-secondary">⬅ Voltar</a>
<button type="submit" class="btn btn-success">💾 Salvar</button>
</div>

</form>

</div>

</div>

</div>

</body>
</html>
